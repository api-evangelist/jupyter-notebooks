naftiko: 1.0.0-alpha2
info:
  label: Jupyter Notebook Server REST API
  description: REST API for the Jupyter Notebook server, providing access to notebook contents, kernels, kernel specs, sessions,
    and terminals. Used by clients to drive interactive computing workflows.
  tags:
  - Jupyter
  - Notebooks
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: jupyter-notebooks
    baseUri: http://localhost:8888/api
    description: Jupyter Notebook Server REST API HTTP API.
    authentication:
      type: bearer
      token: '{{JUPYTER_NOTEBOOKS_TOKEN}}'
    resources:
    - name: contents-path
      path: /contents/{path}
      operations:
      - name: getcontents
        method: GET
        description: Get contents at a path
        inputParameters:
        - name: type
          in: query
          type: string
        - name: format
          in: query
          type: string
        - name: content
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: savecontents
        method: PUT
        description: Save or upload contents at a path
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: renamecontents
        method: PATCH
        description: Rename or move contents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcontents
        method: POST
        description: Create a new file or directory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletecontents
        method: DELETE
        description: Delete contents at a path
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
